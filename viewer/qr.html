<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>質問はこちらから</title>
  <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Helvetica Neue', Arial, sans-serif;
      background: #1e1b4b;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: #fff;
      border-radius: 24px;
      padding: 48px 56px;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,0.4);
      max-width: 480px;
      width: 90%;
    }
    .label {
      font-size: 1rem;
      font-weight: 700;
      color: #6366f1;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    h1 {
      font-size: 2rem;
      color: #1e1b4b;
      margin-bottom: 6px;
      font-weight: 800;
    }
    .sub {
      font-size: 0.95rem;
      color: #64748b;
      margin-bottom: 32px;
    }
    #qrcode {
      display: flex;
      justify-content: center;
      margin-bottom: 28px;
    }
    #qrcode canvas {
      border-radius: 12px;
      padding: 12px;
      background: #f8fafc;
      border: 2px solid #e2e8f0;
    }
    .url-box {
      background: #f1f5f9;
      border-radius: 12px;
      padding: 14px 20px;
      font-size: 0.85rem;
      color: #334155;
      word-break: break-all;
      font-family: monospace;
      letter-spacing: 0.02em;
    }
    .arrow {
      font-size: 2.5rem;
      margin-bottom: 12px;
      display: block;
    }
  </style>
</head>
<body>
  <div class="card">
    <span class="arrow">💬</span>
    <div class="label">Question & Answer</div>
    <h1>ご質問はこちら</h1>
    <p class="sub">QRコードを読み取るか、下のURLにアクセスしてください</p>
    <div id="qrcode"></div>
    <div class="url-box">bestwaycare.github.io/webinar-qa/viewer/</div>
  </div>

  <script>
    QRCode.toCanvas(
      document.createElement('canvas'),
      'https://bestwaycare.github.io/webinar-qa/viewer/',
      { width: 220, margin: 1, color: { dark: '#1e1b4b', light: '#f8fafc' } },
      (err, canvas) => {
        if (!err) document.getElementById('qrcode').appendChild(canvas);
      }
    );
  </script>
</body>
</html>
